name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate tag matches version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify tag matches repo version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node <<'EOF'
          const fs = require("fs");
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const cargoToml = fs.readFileSync("Cargo.toml", "utf8");
          const tauriConf = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          const cargoVersionMatch = cargoToml.match(/^\[workspace\.package\][\s\S]*?^version\s*=\s*"([^"]+)"/m);
          const releaseTag = process.env.RELEASE_TAG || "";
          const expectedTag = `v${packageJson.version}`;

          if (!cargoVersionMatch) {
            console.error("Failed to read workspace.package.version from Cargo.toml");
            process.exit(1);
          }

          if (packageJson.version !== cargoVersionMatch[1] || packageJson.version !== tauriConf.version) {
            console.error("Version mismatch detected between package.json, Cargo.toml, and tauri.conf.json");
            process.exit(1);
          }

          if (releaseTag && releaseTag !== expectedTag) {
            console.error(`Tag ${releaseTag} does not match repo version ${packageJson.version}`);
            process.exit(1);
          }

          console.log(`Release version validated: ${packageJson.version}`);
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            rust_target: ""
            build_command: npm run tauri build
            asset_glob: |
              target/release/bundle/appimage/*.AppImage
              target/release/bundle/deb/*.deb
          - name: Windows
            os: windows-latest
            rust_target: ""
            build_command: npm run tauri build
            asset_glob: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe
          - name: macOS-Apple-Silicon
            os: macos-latest
            rust_target: aarch64-apple-darwin
            build_command: npm run tauri build -- --target aarch64-apple-darwin
            asset_glob: |
              target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - name: macOS-Intel
            os: macos-latest
            rust_target: x86_64-apple-darwin
            build_command: npm run tauri build -- --target x86_64-apple-darwin
            asset_glob: |
              target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache cargo registry and build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build release bundle
        run: ${{ matrix.build_command }}

      - name: List bundle outputs
        shell: bash
        run: |
          find target -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \) | sort || true

      - name: Collect release assets
        id: collect_assets
        shell: bash
        run: |
          shopt -s nullglob
          files=()

          while IFS= read -r pattern; do
            [[ -z "$pattern" ]] && continue
            matches=( $pattern )
            if (( ${#matches[@]} > 0 )); then
              files+=("${matches[@]}")
            fi
          done <<'EOF'
          ${{ matrix.asset_glob }}
          EOF

          if (( ${#files[@]} == 0 )); then
            echo "No release assets found for ${{ matrix.name }}" >&2
            exit 1
          fi

          unique_files="$(printf '%s\n' "${files[@]}" | awk '!seen[$0]++')"

          {
            echo 'files<<EOF'
            printf '%s\n' "$unique_files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ssh-thing-${{ matrix.name }}
          if-no-files-found: error
          path: ${{ steps.collect_assets.outputs.files }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: ${{ steps.collect_assets.outputs.files }}
